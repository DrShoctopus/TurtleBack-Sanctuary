appId: com.turtleback.sanctuary
productName: Turtleback Sanctuary
copyright: Copyright © 2026 Turtleback Sanctuary contributors
asar: true
beforeBuild: scripts/skip-desktop-dependencies.cjs
removePackageScripts: true
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-desktop/**/*
  - package.json
mac:
  category: public.app-category.games
  icon: build/icon.svg
  minimumSystemVersion: '12.0'
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: false
linux:
  category: Game
  target:
    - AppImage
