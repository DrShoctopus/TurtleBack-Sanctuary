name: macOS Apple Silicon release proof

on:
  push:
    branches:
      - work
    paths:
      - '.github/workflows/macos-arm64-release.yml'
      - 'build/**'
      - 'electron-builder*.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/**'
      - 'src/**'
  workflow_dispatch:
    inputs:
      mode:
        description: Build an unsigned proof or a credentialed release candidate
        required: true
        default: unsigned-proof
        type: choice
        options:
          - unsigned-proof
          - signed-release

permissions:
  contents: read

env:
  RELEASE_MODE: ${{ inputs.mode || 'unsigned-proof' }}

jobs:
  macos-arm64:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.12.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm lint
      - name: Build unsigned Apple silicon proof
        if: env.RELEASE_MODE == 'unsigned-proof'
        run: pnpm desktop:package:mac
      - name: Verify unsigned Apple silicon metadata
        if: env.RELEASE_MODE == 'unsigned-proof'
        run: node scripts/verify-macos-release.mjs --mode=local | tee release/macos-arm64-verification.json
      - name: Smoke unsigned Apple silicon application
        if: env.RELEASE_MODE == 'unsigned-proof'
        run: pnpm desktop:smoke
      - name: Prepare Apple notarization API key
        if: env.RELEASE_MODE == 'signed-release'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_KEY_P8"
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
      - name: Build signed and notarized Apple silicon release
        if: env.RELEASE_MODE == 'signed-release'
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: pnpm desktop:release:mac
      - name: Verify signed and notarized Apple silicon release
        if: env.RELEASE_MODE == 'signed-release'
        run: node scripts/verify-macos-release.mjs --mode=release | tee release/macos-arm64-verification.json
      - name: Smoke signed Apple silicon application
        if: env.RELEASE_MODE == 'signed-release'
        run: pnpm desktop:smoke
      - uses: actions/upload-artifact@v4
        with:
          name: turtleback-macos-arm64-${{ env.RELEASE_MODE }}
          path: |
            release/*.dmg
            release/*.zip
            release/*verification.json
          if-no-files-found: ignore
